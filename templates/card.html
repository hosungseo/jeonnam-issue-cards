<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1350px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
      background: #111;
      color: #f5f5f0;
    }
    .card {
      width: 1080px;
      height: 1350px;
      padding: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.3) 42%, rgba(4,6,8,.96) 100%),
        #111;
      position: relative;
      overflow: hidden;
    }
    .photo {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.52) 0 48%, rgba(32,55,61,.54) 48% 100%),
        radial-gradient(circle at 17% 43%, rgba(244,94,47,.46) 0 116px, rgba(72,26,18,.5) 117px 206px, transparent 207px),
        linear-gradient(90deg, transparent 0 48%, rgba(228,232,214,.58) 48% 92%, transparent 92%),
        repeating-linear-gradient(90deg, transparent 0 506px, rgba(0,0,0,.26) 506px 510px, transparent 510px 552px),
        repeating-linear-gradient(0deg, transparent 0 22px, rgba(30,38,42,.42) 22px 27px, transparent 27px 44px),
        linear-gradient(135deg, #171b1c 0%, #38251f 34%, #314246 72%, #111416 100%);
      filter: contrast(1.15) brightness(.7) saturate(.72);
    }
    .photo::before {
      content: "{{category_label}}  {{region}}  {{category_label}}  {{region}}";
      position: absolute;
      left: 500px;
      right: 54px;
      top: 205px;
      bottom: 270px;
      color: rgba(235,235,225,.2);
      font-size: 34px;
      line-height: 1.22;
      font-weight: 900;
      word-break: break-all;
      overflow: hidden;
      column-count: 3;
      column-gap: 20px;
    }
    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.2) 0%, rgba(0,0,0,.22) 28%, rgba(0,0,0,.64) 62%, rgba(4,7,10,.97) 100%),
        radial-gradient(circle at 25% 38%, transparent 0 260px, rgba(0,0,0,.34) 640px);
    }
    .topline {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      color: rgba(255,255,255,.86);
      font-size: 27px;
      line-height: 1.2;
      font-weight: 900;
      text-align: center;
    }
    .brand {
      position: absolute;
      top: 112px;
      right: 60px;
      color: rgba(255,255,255,.76);
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      text-align: right;
    }
    .date {
      margin-top: 18px;
      color: #f15f32;
      font-size: 24px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
      opacity: .72;
    }
    .panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 820px;
      padding: 0 64px 54px;
      background: linear-gradient(180deg, transparent 0%, rgba(5,7,10,.66) 24%, #06080b 100%);
    }
    .headline {
      margin: 0;
      font-size: 62px;
      line-height: 1.12;
      font-weight: 900;
      max-width: 900px;
      word-break: keep-all;
      text-shadow: 0 3px 16px rgba(0,0,0,.65);
    }
    .headline .accent {
      color: #f15f32;
    }
    .category {
      display: block;
      margin-top: 46px;
      color: #fff;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 900;
      word-break: keep-all;
      max-width: 860px;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
      opacity: .92;
    }
    .summary {
      margin-top: 74px;
      color: #efefea;
      font-size: 38px;
      line-height: 1.45;
      font-weight: 800;
      max-width: 880px;
      word-break: keep-all;
      text-shadow: 0 2px 14px rgba(0,0,0,.7);
    }
    .source {
      position: absolute;
      left: 64px;
      right: 64px;
      bottom: 34px;
      font-size: 23px;
      line-height: 1.35;
      color: rgba(255,255,255,.48);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .confidence {
      position: absolute;
      left: 64px;
      bottom: 34px;
      font-size: 23px;
      color: rgba(255,255,255,.48);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="photo"></div>
    <div class="topline">전남 22개 시군구 오늘의 이슈</div>
    <div class="brand">jeonnam.local</div>
    <section class="panel">
      <h1 class="headline">{{accented_headline}}</h1>
      <div class="category">{{category_label}}.</div>
      <div class="date">• {{date_label}}</div>
      <section class="summary">{{summary_html}}</section>
    </section>
    <footer class="source">출처: {{source_label}}</footer>
  </main>
</body>
</html>
