<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1350px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
      background: #111;
      color: #f5f5f0;
    }
    .card {
      width: 1080px;
      height: 1350px;
      padding: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.3) 42%, rgba(4,6,8,.96) 100%),
        #111;
      position: relative;
      overflow: hidden;
    }
    .photo {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 54% 28%, rgba(230,230,215,.78) 0 64px, rgba(77,70,60,.76) 65px 142px, transparent 143px),
        radial-gradient(circle at 28% 34%, rgba(160,150,130,.45) 0 105px, transparent 106px),
        radial-gradient(circle at 80% 30%, rgba(195,180,150,.35) 0 112px, transparent 113px),
        linear-gradient(78deg, transparent 0 38%, rgba(40,72,115,.62) 39% 45%, transparent 46%),
        linear-gradient(102deg, transparent 0 70%, rgba(150,48,42,.58) 71% 76%, transparent 77%),
        linear-gradient(90deg, rgba(40,34,28,.88) 0 18%, rgba(115,92,62,.78) 18% 55%, rgba(38,36,34,.9) 55% 100%),
        linear-gradient(135deg, #26211d 0%, #6a5a43 46%, #171717 100%);
      filter: contrast(1.08) brightness(.72) saturate(.82);
    }
    .photo::before {
      content: "{{region}}";
      position: absolute;
      left: -18px;
      right: -18px;
      bottom: 288px;
      color: rgba(0,0,0,.34);
      font-size: 126px;
      line-height: .86;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
    }
    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.26) 0%, rgba(0,0,0,.22) 32%, rgba(0,0,0,.54) 58%, rgba(3,5,8,.96) 100%),
        radial-gradient(circle at 53% 26%, transparent 0 260px, rgba(0,0,0,.36) 680px);
    }
    .topline {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      color: rgba(255,255,255,.86);
      font-size: 27px;
      line-height: 1.2;
      font-weight: 900;
      text-align: center;
    }
    .brand {
      position: absolute;
      top: 112px;
      right: 60px;
      color: rgba(255,255,255,.76);
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      text-align: right;
    }
    .date {
      position: absolute;
      left: 64px;
      top: 782px;
      color: #f15f32;
      font-size: 34px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
    }
    .panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 720px;
      padding: 232px 64px 54px;
      background: linear-gradient(180deg, transparent 0%, rgba(5,7,10,.66) 24%, #06080b 100%);
    }
    .headline {
      margin: 0;
      position: absolute;
      left: 64px;
      right: 64px;
      top: 80px;
      font-size: 60px;
      line-height: 1.08;
      font-weight: 900;
      max-width: 950px;
      word-break: keep-all;
      text-shadow: 0 3px 16px rgba(0,0,0,.65);
    }
    .headline .accent {
      color: #f15f32;
    }
    .category {
      display: block;
      color: #fff;
      font-size: 42px;
      line-height: 1.42;
      font-weight: 900;
      word-break: keep-all;
      max-width: 860px;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
    }
    .summary {
      margin-top: 58px;
      color: #efefea;
      font-size: 37px;
      line-height: 1.45;
      font-weight: 800;
      max-width: 880px;
      word-break: keep-all;
      text-shadow: 0 2px 14px rgba(0,0,0,.7);
    }
    .source {
      position: absolute;
      left: 64px;
      right: 64px;
      bottom: 34px;
      font-size: 23px;
      line-height: 1.35;
      color: rgba(255,255,255,.48);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .confidence {
      position: absolute;
      left: 64px;
      bottom: 34px;
      font-size: 23px;
      color: rgba(255,255,255,.48);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="photo"></div>
    <div class="topline">전남 22개 시군구 오늘의 이슈</div>
    <div class="brand">jeonnam.local</div>
    <div class="date">• {{date_label}}</div>
    <section class="panel">
      <h1 class="headline"><span class="accent">{{region}}</span>에서 오늘 볼 뉴스</h1>
      <div class="category">{{headline}}</div>
      <section class="summary">{{summary_html}}</section>
    </section>
    <footer class="source">출처: {{source_label}}</footer>
  </main>
</body>
</html>
