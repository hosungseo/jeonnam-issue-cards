<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1350px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
      background: #111;
      color: #f5f5f0;
    }
    .card {
      width: 1080px;
      height: 1350px;
      padding: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.3) 42%, rgba(4,6,8,.96) 100%),
        #111;
      position: relative;
      overflow: hidden;
    }
    .photo {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(77,48,31,.78) 0 18%, transparent 18% 82%, rgba(78,48,31,.78) 82% 100%),
        linear-gradient(0deg, transparent 0 48%, rgba(238,224,196,.2) 48% 50%, transparent 50%),
        radial-gradient(ellipse at 48% 48%, rgba(237,224,197,.42) 0 210px, transparent 212px),
        radial-gradient(circle at 34% 55%, rgba(34,38,42,.72) 0 46px, transparent 48px),
        radial-gradient(circle at 58% 53%, rgba(34,38,42,.68) 0 48px, transparent 50px),
        radial-gradient(circle at 78% 60%, rgba(34,38,42,.64) 0 50px, transparent 52px),
        linear-gradient(90deg, transparent 0 26%, rgba(164,105,54,.5) 26% 75%, transparent 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 8px, transparent 8px 70px),
        linear-gradient(135deg, #1a1f20 0%, #7a5739 48%, #101517 100%);
      filter: contrast(1.05) brightness(.68) saturate(.82);
    }
    .card.category-safety .photo {
      background:
        linear-gradient(0deg, rgba(8,13,16,.98) 0 33%, transparent 33%),
        linear-gradient(90deg, transparent 0 46%, rgba(240,188,74,.42) 46% 48%, transparent 48%),
        radial-gradient(ellipse at 58% 28%, rgba(88,120,132,.54) 0 240px, transparent 242px),
        linear-gradient(16deg, transparent 0 42%, rgba(120,132,136,.38) 43% 48%, transparent 49%),
        linear-gradient(135deg, #1a2228 0%, #3e4b4e 45%, #090d11 100%);
      filter: contrast(1.12) brightness(.66) saturate(.65);
    }
    .card.category-welfare .photo {
      background:
        linear-gradient(90deg, rgba(77,48,31,.78) 0 18%, transparent 18% 82%, rgba(78,48,31,.78) 82% 100%),
        linear-gradient(0deg, transparent 0 48%, rgba(238,224,196,.2) 48% 50%, transparent 50%),
        radial-gradient(ellipse at 48% 48%, rgba(237,224,197,.42) 0 210px, transparent 212px),
        radial-gradient(circle at 34% 55%, rgba(34,38,42,.72) 0 46px, transparent 48px),
        radial-gradient(circle at 58% 53%, rgba(34,38,42,.68) 0 48px, transparent 50px),
        radial-gradient(circle at 78% 60%, rgba(34,38,42,.64) 0 50px, transparent 52px),
        linear-gradient(90deg, transparent 0 26%, rgba(164,105,54,.5) 26% 75%, transparent 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 8px, transparent 8px 70px),
        linear-gradient(135deg, #1a1f20 0%, #7a5739 48%, #101517 100%);
    }
    .card.category-culture .photo {
      background:
        radial-gradient(ellipse at 70% 34%, rgba(72,116,118,.42) 0 220px, transparent 222px),
        linear-gradient(0deg, rgba(5,8,9,.98) 0 28%, transparent 28%),
        linear-gradient(18deg, transparent 0 42%, rgba(235,225,178,.32) 42% 45%, transparent 45%),
        linear-gradient(135deg, #111817 0%, #314b43 48%, #0a0d0d 100%);
      filter: contrast(1.08) brightness(.68) saturate(.78);
    }
    .card.category-economy .photo {
      background:
        radial-gradient(ellipse at 76% 28%, rgba(44,98,132,.46) 0 230px, transparent 232px),
        repeating-linear-gradient(90deg, rgba(255,255,255,.12) 0 3px, transparent 3px 62px),
        linear-gradient(0deg, transparent 0 58%, rgba(54,150,120,.38) 58% 60%, transparent 60%),
        linear-gradient(135deg, #071010 0%, #12302c 44%, #040608 100%);
      filter: contrast(1.12) brightness(.66) saturate(.8);
    }
    .card.category-agri_marine .photo {
      background:
        radial-gradient(ellipse at 78% 32%, rgba(36,118,132,.48) 0 240px, transparent 242px),
        linear-gradient(12deg, transparent 0 52%, rgba(54,128,114,.38) 52% 56%, transparent 56%),
        linear-gradient(0deg, rgba(5,10,12,.95) 0 32%, transparent 32%),
        linear-gradient(135deg, #0b1819 0%, #24534d 48%, #071011 100%);
      filter: contrast(1.08) brightness(.66) saturate(.78);
    }
    .photo::before {
      content: "장성군";
      position: absolute;
      left: -120px;
      top: 455px;
      color: rgba(255,255,255,.1);
      font-size: 84px;
      line-height: 1;
      font-weight: 900;
      white-space: nowrap;
    }
    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.08) 48%, rgba(0,0,0,.42) 78%, rgba(0,0,0,.72) 100%),
        linear-gradient(180deg, rgba(0,0,0,.24) 0%, rgba(0,0,0,.2) 38%, rgba(0,0,0,.62) 76%, rgba(4,7,10,.97) 100%);
    }
    .topline {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      color: rgba(255,255,255,.86);
      font-size: 27px;
      line-height: 1.2;
      font-weight: 900;
      text-align: center;
    }
    .brand {
      position: absolute;
      top: 112px;
      right: 60px;
      color: rgba(255,255,255,.82);
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      text-align: right;
    }
    .date {
      margin-top: 18px;
      color: #38bdf8;
      font-size: 24px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
      opacity: .72;
      display: none;
    }
    .panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 820px;
      padding: 38px 64px 54px;
      background: linear-gradient(180deg, transparent 0%, rgba(5,7,10,.66) 24%, #06080b 100%);
    }
    .headline {
      margin: 0;
      font-size: 62px;
      line-height: 1.12;
      font-weight: 900;
      max-width: 700px;
      word-break: keep-all;
      text-shadow: 0 3px 16px rgba(0,0,0,.65);
    }
    .headline .accent {
      color: #38bdf8;
    }
    .category {
      display: block;
      margin-top: 36px;
      color: #fff;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 900;
      word-break: keep-all;
      max-width: 860px;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
      opacity: .92;
      display: none;
    }
    .summary {
      margin-top: 58px;
      color: #efefea;
      font-size: 36px;
      line-height: 1.42;
      font-weight: 800;
      max-width: 660px;
      word-break: keep-all;
      text-shadow: 0 2px 14px rgba(0,0,0,.7);
    }
    .summary .accent {
      color: #38bdf8;
    }
    .source {
      position: absolute;
      left: 64px;
      right: 64px;
      bottom: 34px;
      font-size: 23px;
      line-height: 1.35;
      color: rgba(255,255,255,.48);
      font-weight: 800;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }
    .confidence {
      position: absolute;
      left: 64px;
      bottom: 34px;
      font-size: 23px;
      color: rgba(255,255,255,.48);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card category-culture">
    <div class="photo"></div>
    <div class="topline">전남 22개 시군 오늘의 이슈</div>
    <div class="brand">gongpenclaw.kr</div>
    <section class="panel">
      <h1 class="headline">장성 황룡강 음악힐링축제 개막…25일까지 자연과 음악의 <span class="accent">만남</span></h1>
      <div class="category">문화·관광.</div>
      <div class="date">• 2026-05-29</div>
      <section class="summary">장성 황룡강에서 5월 23일부터 25일까지 음악힐링축제가 열린다.장성군(군수 <span class="accent">김한종)은…</span><br><br>방문객 이동 흐름과 주변 상권 동선에도 변화가 <span class="accent">예상됩니다</span>.<br><br>관광 체감 효과는 운영 방식에 달려 <span class="accent">있습니다</span>.</section>
    </section>
    <footer class="source">출처: 에버뉴스 지역소식 · evernews.co.kr</footer>
  </main>
</body>
</html>
