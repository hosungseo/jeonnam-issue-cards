<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1350px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
      background: #111;
      color: #f5f5f0;
    }
    .card {
      width: 1080px;
      height: 1350px;
      padding: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.3) 42%, rgba(4,6,8,.96) 100%),
        #111;
      position: relative;
      overflow: hidden;
    }
    .photo {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(77,48,31,.78) 0 18%, transparent 18% 82%, rgba(78,48,31,.78) 82% 100%),
        linear-gradient(0deg, transparent 0 48%, rgba(238,224,196,.2) 48% 50%, transparent 50%),
        radial-gradient(ellipse at 48% 48%, rgba(237,224,197,.42) 0 210px, transparent 212px),
        radial-gradient(circle at 34% 55%, rgba(34,38,42,.72) 0 46px, transparent 48px),
        radial-gradient(circle at 58% 53%, rgba(34,38,42,.68) 0 48px, transparent 50px),
        radial-gradient(circle at 78% 60%, rgba(34,38,42,.64) 0 50px, transparent 52px),
        linear-gradient(90deg, transparent 0 26%, rgba(164,105,54,.5) 26% 75%, transparent 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 8px, transparent 8px 70px),
        linear-gradient(135deg, #1a1f20 0%, #7a5739 48%, #101517 100%);
      filter: contrast(1.05) brightness(.68) saturate(.82);
    }
    .photo::before {
      content: "여수시";
      position: absolute;
      left: -120px;
      top: 455px;
      color: rgba(255,255,255,.1);
      font-size: 84px;
      line-height: 1;
      font-weight: 900;
      white-space: nowrap;
    }
    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.08) 48%, rgba(0,0,0,.42) 78%, rgba(0,0,0,.72) 100%),
        linear-gradient(180deg, rgba(0,0,0,.24) 0%, rgba(0,0,0,.2) 38%, rgba(0,0,0,.62) 76%, rgba(4,7,10,.97) 100%);
    }
    .topline {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      color: rgba(255,255,255,.86);
      font-size: 27px;
      line-height: 1.2;
      font-weight: 900;
      text-align: center;
    }
    .brand {
      position: absolute;
      top: 112px;
      right: 60px;
      color: rgba(255,255,255,.76);
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      text-align: right;
    }
    .date {
      margin-top: 18px;
      color: #f15f32;
      font-size: 24px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
      opacity: .72;
      display: none;
    }
    .panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 820px;
      padding: 38px 64px 54px;
      background: linear-gradient(180deg, transparent 0%, rgba(5,7,10,.66) 24%, #06080b 100%);
    }
    .headline {
      margin: 0;
      font-size: 62px;
      line-height: 1.12;
      font-weight: 900;
      max-width: 700px;
      word-break: keep-all;
      text-shadow: 0 3px 16px rgba(0,0,0,.65);
    }
    .headline .accent {
      color: #f15f32;
    }
    .category {
      display: block;
      margin-top: 36px;
      color: #fff;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 900;
      word-break: keep-all;
      max-width: 860px;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
      opacity: .92;
      display: none;
    }
    .summary {
      margin-top: 58px;
      color: #efefea;
      font-size: 36px;
      line-height: 1.42;
      font-weight: 800;
      max-width: 660px;
      word-break: keep-all;
      text-shadow: 0 2px 14px rgba(0,0,0,.7);
    }
    .summary .accent {
      color: #f15f32;
    }
    .source {
      position: absolute;
      left: 64px;
      right: 64px;
      bottom: 34px;
      font-size: 23px;
      line-height: 1.35;
      color: rgba(255,255,255,.48);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .confidence {
      position: absolute;
      left: 64px;
      bottom: 34px;
      font-size: 23px;
      color: rgba(255,255,255,.48);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="photo"></div>
    <div class="topline">전남 22개 시군구 오늘의 이슈</div>
    <div class="brand">jeonnam.local</div>
    <section class="panel">
      <h1 class="headline">여수시,<br><span class="accent">장마철 침수 취약도로 사전 점검 강화</span></h1>
      <div class="category">안전·교통.</div>
      <div class="date">• 2026-05-22</div>
      <section class="summary">여수시는 장마철을 앞두고 침수 취약도로와 해안 저지대 <span class="accent">배수시설…</span><br><br>장마 전 점검이 <span class="accent">시작됐습니다</span>.</section>
    </section>
    <footer class="source">출처: 여수시 · yeosu.go.kr</footer>
  </main>
</body>
</html>
