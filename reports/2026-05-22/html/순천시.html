<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1350px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
      background: #111;
      color: #f5f5f0;
    }
    .card {
      width: 1080px;
      height: 1350px;
      padding: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.3) 42%, rgba(4,6,8,.96) 100%),
        #111;
      position: relative;
      overflow: hidden;
    }
    .photo {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 92% 28%, rgba(70,82,88,.82) 0 230px, transparent 232px),
        linear-gradient(90deg, transparent 0 63%, rgba(170,178,170,.16) 63% 66%, rgba(16,20,23,.82) 66% 100%),
        linear-gradient(0deg, transparent 0 42%, rgba(230,230,220,.2) 42% 43%, transparent 43% 100%),
        linear-gradient(22deg, transparent 0 70%, rgba(60,100,92,.42) 70% 72%, transparent 72%),
        linear-gradient(90deg, rgba(5,9,10,.98) 0 50%, rgba(9,19,18,.9) 50% 70%, rgba(2,4,7,.98) 70% 100%),
        linear-gradient(135deg, #06090a 0%, #0e1c1a 52%, #050507 100%);
      filter: contrast(1.15) brightness(.7) saturate(.72);
    }
    .photo::before {
      content: "순천시";
      position: absolute;
      left: -120px;
      top: 440px;
      color: rgba(42,150,114,.2);
      font-size: 84px;
      line-height: 1;
      font-weight: 900;
      white-space: nowrap;
    }
    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.14) 0%, rgba(0,0,0,.1) 44%, rgba(0,0,0,.54) 66%, rgba(0,0,0,.86) 100%),
        linear-gradient(180deg, rgba(0,0,0,.22) 0%, rgba(0,0,0,.22) 28%, rgba(0,0,0,.58) 70%, rgba(4,7,10,.97) 100%);
    }
    .topline {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      color: rgba(255,255,255,.86);
      font-size: 27px;
      line-height: 1.2;
      font-weight: 900;
      text-align: center;
    }
    .brand {
      position: absolute;
      top: 112px;
      right: 60px;
      color: rgba(255,255,255,.76);
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      text-align: right;
    }
    .date {
      margin-top: 18px;
      color: #f15f32;
      font-size: 24px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
      opacity: .72;
      display: none;
    }
    .panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 820px;
      padding: 22px 64px 54px;
      background: linear-gradient(180deg, transparent 0%, rgba(5,7,10,.66) 24%, #06080b 100%);
    }
    .headline {
      margin: 0;
      font-size: 62px;
      line-height: 1.12;
      font-weight: 900;
      max-width: 760px;
      word-break: keep-all;
      text-shadow: 0 3px 16px rgba(0,0,0,.65);
    }
    .headline .accent {
      color: #f15f32;
    }
    .category {
      display: block;
      margin-top: 36px;
      color: #fff;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 900;
      word-break: keep-all;
      max-width: 860px;
      text-shadow: 0 3px 18px rgba(0,0,0,.7);
      opacity: .92;
      display: none;
    }
    .summary {
      margin-top: 70px;
      color: #efefea;
      font-size: 38px;
      line-height: 1.58;
      font-weight: 800;
      max-width: 720px;
      word-break: keep-all;
      text-shadow: 0 2px 14px rgba(0,0,0,.7);
    }
    .source {
      position: absolute;
      left: 64px;
      right: 64px;
      bottom: 34px;
      font-size: 23px;
      line-height: 1.35;
      color: rgba(255,255,255,.48);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .confidence {
      position: absolute;
      left: 64px;
      bottom: 34px;
      font-size: 23px;
      color: rgba(255,255,255,.48);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="photo"></div>
    <div class="topline">전남 22개 시군구 오늘의 이슈</div>
    <div class="brand">jeonnam.local</div>
    <section class="panel">
      <h1 class="headline">순천시,<br><span class="accent">청년 창업공간 입주기업 추가 모집</span></h1>
      <div class="category">복지·생활.</div>
      <div class="date">• 2026-05-22</div>
      <section class="summary">순천시는 지역 청년 창업 지원을 위해 창업공간 입주기업을 추가 모집하고 멘토…<br>주민 생활 영향과 후속 조치가 확인된 이슈입니다.</section>
    </section>
    <footer class="source">출처: 순천시 · suncheon.go.kr</footer>
  </main>
</body>
</html>
