<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1350px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
      background: #111;
      color: #f5f5f0;
    }
    .card {
      width: 1080px;
      height: 1350px;
      padding: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.22) 0%, rgba(0,0,0,.18) 40%, rgba(0,0,0,.9) 100%),
        #111;
      position: relative;
      overflow: hidden;
    }
    .photo {
      position: absolute;
      inset: 0 0 390px 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.12) 0 2px, transparent 2px 314px, rgba(255,255,255,.10) 314px 316px, transparent 316px),
        radial-gradient(circle at 46% 34%, rgba(245,245,245,.72) 0 58px, rgba(90,90,90,.7) 59px 122px, transparent 123px),
        linear-gradient(14deg, transparent 0 46%, rgba(230,230,230,.52) 47% 51%, transparent 52%),
        linear-gradient(90deg, rgba(235,235,235,.38) 0 16%, transparent 16% 36%, rgba(235,235,235,.55) 36% 64%, transparent 64% 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.18) 0 13px, rgba(0,0,0,.12) 13px 26px),
        linear-gradient(135deg, #2f2f2f 0%, #777 48%, #252525 100%);
      filter: grayscale(1) contrast(1.18) brightness(.72);
      transform: scale(1.04);
    }
    .photo::before {
      content: "순천시";
      position: absolute;
      left: -28px;
      right: -28px;
      bottom: 36px;
      color: rgba(0,0,0,.5);
      font-size: 132px;
      line-height: .86;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
    }
    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.08) 0%, rgba(0,0,0,.18) 54%, rgba(0,0,0,.9) 100%),
        radial-gradient(circle at 50% 27%, transparent 0 210px, rgba(0,0,0,.28) 520px);
    }
    .brand {
      position: absolute;
      top: 42px;
      right: 44px;
      color: rgba(255,255,255,.42);
      font-size: 44px;
      line-height: .84;
      font-weight: 900;
      text-align: right;
    }
    .date {
      position: absolute;
      left: 62px;
      top: 590px;
      color: #dc6b3d;
      font-size: 31px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }
    .panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 590px;
      padding: 34px 64px 54px;
      background:
        linear-gradient(180deg, rgba(31,34,34,.72) 0%, rgba(18,20,22,.96) 46%, #070809 100%);
      box-shadow: 0 -34px 60px rgba(0,0,0,.38);
    }
    .headline {
      margin: 0;
      font-size: 74px;
      line-height: 1.08;
      font-weight: 900;
      max-width: 950px;
      word-break: keep-all;
      text-shadow: 0 3px 16px rgba(0,0,0,.65);
    }
    .category {
      display: block;
      margin-top: 18px;
      color: #e46538;
      font-size: 60px;
      line-height: 1.05;
      font-weight: 900;
      word-break: keep-all;
    }
    .summary {
      margin-top: 48px;
      color: #efefea;
      font-size: 32px;
      line-height: 1.55;
      font-weight: 800;
      max-width: 925px;
      word-break: keep-all;
      text-shadow: 0 2px 14px rgba(0,0,0,.7);
    }
    .source {
      position: absolute;
      left: 64px;
      right: 64px;
      bottom: 34px;
      font-size: 23px;
      line-height: 1.35;
      color: rgba(255,255,255,.48);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .confidence {
      position: absolute;
      left: 64px;
      bottom: 34px;
      font-size: 23px;
      color: rgba(255,255,255,.48);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="photo"></div>
    <div class="brand">JEONNAM<br>BRIEF</div>
    <div class="date">• 2026-05-22</div>
    <section class="panel">
      <h1 class="headline">순천시에서</h1>
      <div class="category">순천시, 청년 창업공간 입주기업 추가 모집</div>
      <section class="summary">순천시는 지역 청년 창업 지원을 위해 창업공간 입주기업을 추가 모집하고 멘토…<br>주민 생활 영향과 후속 조치가 확인된 이슈입니다.</section>
    </section>
    <footer class="source">출처: 순천시 · suncheon.go.kr</footer>
  </main>
</body>
</html>
